ja:
  # ============================================================
  # ActiveRecord 標準
  # ============================================================
  activerecord:
    models:
      user: "ユーザー"
      pact: "誓約"
      check_in: "チェックイン"
      crest: "紋章"
      ai_generation: "AI 生成履歴"
      password_reset_token: "パスワード再設定トークン"

    attributes:
      user:
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"
        nickname: "ニックネーム"
        avatar_url: "アバター URL"
        is_public: "公開設定"
        is_guest: "ゲスト"
        streak_count: "連続記録"
        longest_streak: "最長記録"
        current_password: "現在のパスワード"
      pact:
        goal: "目標"
        constraint_text: "制約"
        difficulty: "難易度"
        difficulty_reason: "難易度の理由"
        deadline: "期日"
        signed_at: "締結日時"
        completed_at: "達成日時"
        status: "状態"
        title: "称号"
      check_in:
        pact: "誓約"
        checked_on: "チェックイン日"
        status: "状態"
        note: "メモ"
      crest:
        pact: "誓約"
        rarity: "レアリティ"
        crest_data: "紋章データ"
        generated_at: "生成日時"
      password_reset_token:
        token: "トークン"
        expires_at: "有効期限"
        used_at: "使用日時"

    errors:
      messages:
        record_invalid: "バリデーションに失敗しました: %{errors}"

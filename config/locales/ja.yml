      active: "進行中"
      completed: "達成"
      failed: "失敗"
      abandoned: "破棄"
    buttons:
      sign: "ここに誓う"
      next: "次へ"
      back: "戻る"
      abandon: "誓いを破棄する"
    messages:
      signed: "本書に記された誓いは、あなた自身との不動の契約となる。"
      completed: "成就せり"

  check_ins:
    statuses:
      kept: "守れた"
      broken: "破れた"
      skipped: "休戦"
    buttons:
      submit: "記録する"

  crests:
    headings:
      gallery: "誓約の殿堂"
    rarities:
      common: "通常"
      rare: "稀少"
      epic: "英雄"
      legendary: "伝説"
    labels:
      common: "Common"
      rare: "Rare"
      epic: "Epic"
      legendary: "Legendary"

  rankings:
    headings:
      title: "誓約者の番付"
      streak: "連続日数"
      monthly: "今月の達成数"
    labels:
      my_rank: "あなたの順位"
      out_of_rank: "圏外"
      you: "あなた"
      private_notice: "あなたは「ランキング非表示」設定です。一覧には載りませんが、自分の順位は見えます。"

  ai:
    buttons:
      suggest_goal: "AI に提案してもらう"
      suggest_random: "おまかせで提案してもらう"
      suggest_constraint: "AI に提案してもらう"
      judge_difficulty: "難易度を判定"
      generate_title: "称号を授かる"
    placeholders:
      theme: "例：健康、学習、創作"
